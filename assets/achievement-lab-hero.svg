<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Achievement Lab</title>
  <desc id="desc">A quiet editorial cover with a profile map made from soft squircle cards.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#28241d" flood-opacity=".08"/>
    </filter>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f5f0"/>
      <stop offset="1" stop-color="#eeeae2"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#paper)"/>
  <circle cx="1106" cy="96" r="210" fill="#ffffff" opacity=".30"/>
  <path d="M0 521C209 470 348 569 557 525c210-45 410-149 723-76v191H0Z" fill="#faf9f6" opacity=".7"/>

  <g transform="translate(72 76)">
    <rect width="48" height="48" rx="18" fill="#17181a"/>
    <path d="M13 31V17c0-3 2-5 5-5h13" fill="none" stroke="#f7f5f0" stroke-width="4" stroke-linecap="round"/>
    <path d="M13 32c8-1 10-8 15-8 4 0 6 5 10 5" fill="none" stroke="#9274f4" stroke-width="4" stroke-linecap="round"/>
    <text x="66" y="16" fill="#62625f" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="2.4">FIELD GUIDE / 01</text>
    <text x="0" y="150" fill="#17181a" font-family="Georgia, 'Times New Roman', serif" font-size="78">Achievement</text>
    <text x="0" y="231" fill="#17181a" font-family="Georgia, 'Times New Roman', serif" font-size="78">Lab</text>
    <text x="2" y="291" fill="#565753" font-family="Arial, Helvetica, sans-serif" font-size="23">Build a profile people remember.</text>
    <text x="2" y="328" fill="#565753" font-family="Arial, Helvetica, sans-serif" font-size="23">Test only what you can defend.</text>
    <rect x="0" y="382" width="172" height="48" rx="20" fill="#5b35d5"/>
    <text x="24" y="413" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing=".7">CALM ON TOP</text>
    <text x="196" y="412" fill="#777772" font-family="Arial, Helvetica, sans-serif" font-size="15">Evidence underneath.</text>
  </g>

  <g transform="translate(732 74)" filter="url(#shadow)">
    <rect width="458" height="490" rx="54" fill="#fbfaf7" stroke="#dcd7ce"/>
    <rect x="40" y="42" width="378" height="94" rx="30" fill="#f2efe9" stroke="#e2ded6"/>
    <circle cx="87" cy="89" r="22" fill="#17181a"/>
    <path d="M78 96V82c0-3 2-5 5-5h11M78 96c7-1 10-7 14-7 3 0 5 4 9 4" fill="none" stroke="#f7f5f0" stroke-width="3" stroke-linecap="round"/>
    <text x="124" y="82" fill="#17181a" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.4">PROFILE</text>
    <text x="124" y="107" fill="#6c6c68" font-family="Arial, Helvetica, sans-serif" font-size="14">one clear promise</text>

    <rect x="40" y="154" width="178" height="150" rx="34" fill="#17181a"/>
    <text x="65" y="190" fill="#a991ff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="1.6">PROJECTS</text>
    <text x="65" y="232" fill="#fff" font-family="Georgia, 'Times New Roman', serif" font-size="32">Proof</text>
    <path d="M66 269h84M66 281h55" stroke="#595a5b" stroke-width="7" stroke-linecap="round"/>

    <rect x="236" y="154" width="182" height="150" rx="34" fill="#f2efe9" stroke="#e2ded6"/>
    <text x="261" y="190" fill="#5b35d5" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="1.6">ACHIEVEMENTS</text>
    <text x="261" y="231" fill="#17181a" font-family="Georgia, 'Times New Roman', serif" font-size="31">Context</text>
    <rect x="261" y="261" width="55" height="22" rx="11" fill="#5b35d5"/>
    <text x="275" y="277" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700">x4 max</text>

    <rect x="40" y="322" width="378" height="126" rx="34" fill="#f2efe9" stroke="#e2ded6"/>
    <text x="67" y="360" fill="#17181a" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="1.6">METHOD</text>
    <path d="M68 394h242M68 416h187" stroke="#b2aea7" stroke-width="8" stroke-linecap="round"/>
    <circle cx="374" cy="392" r="20" fill="#5b35d5"/>
    <path d="m365 392 6 6 12-14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
